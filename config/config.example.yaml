# DQN Training Configuration Example
# Copy this file to config.yaml and modify values as needed

# Environment Configuration
environment:
  id: "ALE/Breakout-v5"
  render_mode: null  # "human" for visualization, null for silent
  seed: 42

# Training Configuration
training:
  total_timesteps: 500000
  learning_rate: 0.0001
  batch_size: 32
  gamma: 0.99
  
  # Exploration settings
  exploration:
    initial_eps: 1.0
    final_eps: 0.05
    exploration_fraction: 0.3
  
  # Network settings
  network:
    policy: "CnnPolicy"  # "CnnPolicy" or "MlpPolicy"
    net_arch: null
    activation_fn: "relu"
  
  # Buffer and learning settings
  replay_buffer_size: 100000
  learning_starts: 50000
  train_freq: 4
  target_update_interval: 10000
  max_grad_norm: 10.0
  gradient_steps: 1

# Logging Configuration
logging:
  experiment_name: "exp1"
  log_dir: "./results/logs"
  save_dir: "./results/models"
  save_freq: 10000
  save_best: true
  tensorboard_log: "./results/logs"

# Hardware Configuration
hardware:
  device: "auto"  # "auto", "cpu", "cuda"
  n_envs: 1
  n_steps: 50000

# Evaluation Configuration
evaluation:
  eval_freq: 50000
  n_eval_episodes: 3
  render_eval: false
